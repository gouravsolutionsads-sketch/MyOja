<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>OJA - शेतकरी व्यवस्थापन प्रणाली (AI Powered)</title>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  
  <!-- jsPDF for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  
  <style>
    /* CSS STYLE START - RED THEME */
    :root {
      --bg-gradient: linear-gradient(135deg, #1a0000, #4a0000, #2a0000);
      --card-bg: rgba(255, 255, 255, 0.08);
      --accent: #ff3333;
      --accent-dark: #cc0000;
      --text: #ffffff;
      --muted: #ff9999;
      --success: #00ff88;
      --warning: #ffaa00;
      --danger: #ff4757;
      --info-bg: rgba(255, 51, 51, 0.1);
      --shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
      --shadow-heavy: 0 20px 50px rgba(255, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      margin: 0;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
      overflow-x: hidden;
    }

    /* हेडर - RED DESIGN */
    .header {
      background: rgba(40, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 2px solid rgba(255, 51, 51, 0.5);
      box-shadow: var(--shadow-heavy);
    }
    
    .logo {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(45deg, #ff3333, #cc0000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1.5px;
      text-shadow: 0 2px 10px rgba(255, 51, 51, 0.3);
    }

    /* लेआउट */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 15px;
    }
    
    .hidden {
      display: none !important;
    }

    /* कार्ड - RED DESIGN */
    .card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 51, 51, 0.2);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      position: relative;
    }
    
    .card:hover {
      box-shadow: 0 15px 40px rgba(255, 0, 0, 0.3);
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #ff3333, #cc0000);
      border-radius: 15px 15px 0 0;
    }

    .card-title {
      font-size: 14px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 15px;
      border-bottom: 2px solid rgba(255, 51, 51, 0.3);
      padding-bottom: 8px;
      font-weight: 700;
    }

    /* फॉर्म */
    label {
      display: block;
      color: var(--muted);
      font-size: 14px;
      margin: 10px 0 5px;
      font-weight: 500;
    }
    
    input, select, textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 10px;
      transition: all 0.3s ease;
    }
    
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
    }
    
    /* युनिट सेलेक्शन */
    .unit-selection {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .unit-option {
      flex: 1;
      text-align: center;
      padding: 10px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .unit-option:hover {
      border-color: var(--accent);
    }
    
    .unit-option.selected {
      background: linear-gradient(135deg, #ff3333, #cc0000);
      border-color: var(--accent);
      color: white;
      box-shadow: 0 5px 15px rgba(255, 51, 51, 0.3);
    }

    /* बटणे - RED DESIGN */
    .btn {
      width: 100%;
      padding: 16px;
      margin-top: 15px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #ff3333, #cc0000);
      box-shadow: 0 10px 25px rgba(255, 51, 51, 0.3);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(255, 51, 51, 0.4);
    }
    
    .btn:active {
      transform: translateY(-1px);
    }
    
    .btn-ghost {
      background: transparent;
      border: 2px solid rgba(255, 51, 51, 0.5);
      box-shadow: none;
      width: auto;
      padding: 8px 16px;
      font-size: 14px;
    }
    
    .btn-success {
      background: linear-gradient(135deg, #00ff88, #00cc66);
      box-shadow: 0 10px 25px rgba(0, 255, 136, 0.3);
    }
    
    .btn-warning {
      background: linear-gradient(135deg, #ffaa00, #ff8800);
      box-shadow: 0 10px 25px rgba(255, 170, 0, 0.3);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #ff4757, #cc0000);
      box-shadow: 0 10px 25px rgba(255, 71, 87, 0.3);
    }
    
    .btn-ai {
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      box-shadow: 0 10px 25px rgba(37, 117, 252, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      margin: 3px;
      width: auto;
    }

    /* सूची आणि आकडे */
    .flex-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0;
    }
    
    .stat-val {
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(45deg, #ff3333, #cc0000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .text-red { color: #ff3333; }
    .text-green { color: #00ff88; }
    .text-yellow { color: #ffaa00; }
    .text-blue { color: #ff6666; }
    
    .list-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      border-left: 4px solid var(--accent);
      transition: all 0.3s ease;
    }
    
    .list-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    
    /* टॅब - RED DESIGN */
    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }
    
    .tab-btn {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 6px;
      text-align: center;
      border-radius: 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      font-weight: 600;
    }
    
    @media (min-width: 400px) {
        .tab-btn {
          font-size: 12px;
          padding: 12px 8px;
        }
    }
    
    .tab-btn:hover {
      border-color: rgba(255, 51, 51, 0.3);
    }
    
    .tab-btn.active {
      background: linear-gradient(135deg, #ff3333, #cc0000);
      color: white;
      box-shadow: 0 8px 20px rgba(255, 51, 51, 0.3);
      border-color: var(--accent);
    }

    /* होम पेज */
    .login-card-v2 {
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid var(--accent);
        text-align: center;
        margin-top: 30px;
        box-shadow: 0 20px 50px rgba(255, 0, 0, 0.2);
    }
    
    .login-card-v2 h2 {
        background: linear-gradient(45deg, #ff3333, #cc0000);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0 0 20px;
        font-size: 24px;
        font-weight: 900;
    }
    
    .info-box {
        background: rgba(255, 51, 51, 0.05);
        border: 2px solid rgba(255, 51, 51, 0.3);
        padding: 15px;
        border-radius: 12px;
        margin-top: 20px;
        text-align: left;
        box-shadow: 0 10px 30px rgba(255, 0, 0, 0.1);
    }
    
    .info-box ul {
        list-style: none;
        padding: 0;
        margin: 10px 0 0;
    }
    
    .info-box li {
        margin-bottom: 8px;
        font-size: 14px;
        color: #ffcccc;
        padding-left: 25px;
        position: relative;
    }
    
    .info-box li::before {
        content: '✓';
        position: absolute;
        left: 0;
        color: var(--accent);
        font-weight: bold;
    }
    
    .rate-setting-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 10px;
    }
    
    /* क्विक एक्शन बटणे */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 15px 0;
    }
    
    /* कॅल्क्युलेशन बॉक्स */
    .calculation-box {
      background: rgba(0, 0, 0, 0.2);
      border: 2px solid rgba(255, 51, 51, 0.3);
      border-radius: 12px;
      padding: 15px;
      margin: 15px 0;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
    
    .calc-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 14px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .calc-row:last-child {
      border-bottom: none;
      font-size: 16px;
      font-weight: 700;
      margin-top: 10px;
    }
    
    /* मेसेज बॉक्स */
    .message-box {
      padding: 12px;
      border-radius: 10px;
      margin: 10px 0;
      font-weight: 500;
      text-align: center;
      animation: fadeIn 0.5s ease;
      display: none;
    }
    
    .message-success {
      background: rgba(0, 255, 136, 0.1);
      border: 2px solid rgba(0, 255, 136, 0.3);
      color: #00ff88;
    }
    
    .message-error {
      background: rgba(255, 71, 87, 0.1);
      border: 2px solid rgba(255, 71, 87, 0.3);
      color: #ff4757;
    }
    
    /* फॅड इन एनिमेशन */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* लोडिंग स्पिनर */
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 51, 51, 0.1);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* मोडल स्टाईल */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }
    
    .modal-content {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 20px;
      width: 90%;
      max-width: 500px;
      border: 2px solid var(--accent);
      box-shadow: var(--shadow-heavy);
    }

    /* SMS मोडल */
    .sms-modal {
      max-width: 400px;
    }
    
    .sms-template {
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 10px;
      margin: 10px 0;
      border-left: 3px solid var(--accent);
    }
    
    .sms-template h4 {
      margin: 0 0 10px 0;
      color: var(--accent);
    }
    
    .sms-template p {
      margin: 5px 0;
      font-size: 14px;
      line-height: 1.4;
    }
    
    /* चेकबॉक्स स्टाईल */
    .checkbox-container {
      display: flex;
      align-items: center;
      margin: 10px 0;
      cursor: pointer;
    }
    
    .checkbox-container input {
      width: auto;
      margin-right: 10px;
      transform: scale(1.2);
    }
    
    .checkbox-container label {
      margin: 0;
      cursor: pointer;
    }

    /* चॅटबॉट स्टाईल */
    .chat-container {
      height: 400px;
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      overflow: hidden;
    }
    
    .chat-messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .chat-input-container {
      padding: 15px;
      border-top: 1px solid rgba(255, 51, 51, 0.2);
      background: rgba(0, 0, 0, 0.3);
    }
    
    .chat-input-row {
      display: flex;
      gap: 10px;
    }
    
    .chat-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 51, 51, 0.3);
      color: white;
      padding: 10px;
      border-radius: 8px;
    }
    
    .message-bot {
      background: rgba(255, 51, 51, 0.1);
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 51, 51, 0.3);
      max-width: 85%;
      align-self: flex-start;
      border-left: 3px solid #00d2ff;
    }
    
    .message-user {
      background: rgba(0, 100, 0, 0.2);
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(0, 255, 0, 0.3);
      max-width: 85%;
      align-self: flex-end;
      text-align: right;
    }
    
    /* व्हिडिओ गॅलरी */
    .video-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    
    .video-item {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .video-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 51, 51, 0.3);
    }
    
    .video-thumbnail {
      width: 100%;
      height: 100px;
      background: linear-gradient(135deg, #ff3333, #cc0000);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }
    
    .video-title {
      padding: 8px;
      font-size: 12px;
      text-align: center;
      color: var(--muted);
    }
    
    /* स्क्रॉलबार स्टाईल */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-dark);
    }
    
    /* AI Typing Effect */
    .typing-indicator span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: #fff;
      border-radius: 50%;
      animation: typing 1s infinite;
      margin: 0 2px;
    }
    
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-5px); opacity: 1; }
    }
    
    /* काम प्रकार व्यवस्थापन स्टाईल */
    .work-type-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }
    
    .work-type-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid var(--accent);
    }
    
    .work-type-info {
      flex: 1;
    }
    
    .work-type-name {
      font-weight: bold;
      color: var(--text);
    }
    
    .work-type-rate {
      font-size: 12px;
      color: var(--muted);
    }
    
    .work-type-actions {
      display: flex;
      gap: 5px;
    }
    
    /* डिलीट/एडिट बटणे */
    .action-buttons {
      display: flex;
      gap: 5px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    
    /* Protected users (cannot delete) */
    .protected {
      opacity: 0.7;
      position: relative;
    }
    
    .protected::after {
      content: '🔒';
      position: absolute;
      top: 5px;
      right: 5px;
      font-size: 10px;
    }
    
    /* पेमेंट रिक्वेस्ट स्टाईल */
    .payment-request-item {
      background: rgba(0, 100, 0, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 4px solid #00ff88;
    }
    
    .payment-status {
      padding: 3px 8px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: bold;
    }
    
    .status-pending { background: #ffaa00; color: #000; }
    .status-approved { background: #00ff88; color: #000; }
    .status-rejected { background: #ff4757; color: #fff; }
    
    /* पेमेंट मोडल - UPDATED */
    .payment-methods {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 15px 0;
    }
    
    .payment-method {
      background: rgba(0, 0, 0, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .payment-method:hover {
      border-color: var(--accent);
      background: rgba(255, 51, 51, 0.1);
    }
    
    .payment-method.selected {
      border-color: #00ff88;
      background: rgba(0, 255, 136, 0.1);
    }
    
    /* QR Code Display */
    .qr-code-container {
        background: white;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        margin: 15px 0;
    }
    .qr-code-container img {
        max-width: 200px;
        max-height: 200px;
        border: 2px solid #333;
        border-radius: 10px;
    }
    
    /* रिसिप्ट स्टाईल */
    .receipt-container {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: 0 auto;
    }
    
    .receipt-header {
      text-align: center;
      border-bottom: 2px solid #ff3333;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    
    .receipt-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      padding: 5px 0;
      border-bottom: 1px dashed #ccc;
    }
    
    .receipt-total {
      font-weight: bold;
      font-size: 18px;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 2px solid #ff3333;
    }
    
    /* कोड अपडेट स्टाईल */
    .code-update-box {
      background: rgba(106, 17, 203, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin: 15px 0;
      border: 1px solid #6a11cb;
    }
    
    .update-log {
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 12px;
    }
    
    .update-log-item {
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    /* बिल जनरेटर स्टाईल */
    .bill-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 15px 0;
    }
    
    .bill-option {
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .bill-option:hover {
      background: rgba(255, 51, 51, 0.1);
      border: 2px solid var(--accent);
    }
    .bill-option.selected {
